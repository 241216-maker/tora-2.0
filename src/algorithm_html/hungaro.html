<!DOCTYPE html> <html lang="es"> <head>
  <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>TORA Advanced - Método Húngaro</title> <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800"> <div id="main-app-content" class="p-6 max-w-7xl mx-auto">
    </div>

  <script type="module">
    // Importa la función de carga desde tu archivo lógico compilado en la arquitectura de desarrollo
    import { cargarModuloHungaro } from '../core/transport/Hungarian.js';
    
    // Escucha el evento de carga del navegador para garantizar que el DOM esté listo antes de ejecutar código
    document.addEventListener('DOMContentLoaded', () => {
      try {
        // Intenta ejecutar la función para pintar e iniciar el simulador del Método Húngaro
        cargarModuloHungaro();
      } catch (error) {
        // En caso de que falle una ruta o compilación, captura el error y lo muestra discretamente en la consola del navegador
        console.error("Error cargando el método húngaro:", error);
      }
    });
  </script>
</body>
</html>
